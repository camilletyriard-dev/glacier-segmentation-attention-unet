name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Lint scripts and preprocessing modules
        run: flake8 scripts/ preprocessing_switzerland/ preprocessing_paper/ --max-line-length=100 --ignore=E501,W503